packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true

# pnpm 11+ reads settings from pnpm-workspace.yaml (not from package.json's
# "pnpm" field, which is no longer read). See https://pnpm.io/settings.
#
# onlyBuiltDependencies: explicit allowlist of packages whose postinstall /
# install build scripts are allowed to run. pnpm 11 blocks all build scripts
# by default as a supply-chain hardening measure. These six are
# well-known native-binary packages used by Next.js (@swc/core, sharp),
# Drizzle Kit / Vite (esbuild), NestJS file watching (@parcel/watcher),
# BullMQ (msgpackr-extract — native msgpack unpacker for Redis), and
# eslint-import-resolver-typescript (unrs-resolver — native resolver for
# TypeScript project references, required for the no-internal-modules rule
# to actually fire on .ts files; see packages/eslint-config/flat-config.js).
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - 'esbuild'
  - 'sharp'
  - 'msgpackr-extract'
  - 'unrs-resolver'
