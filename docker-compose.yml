# docker-compose.yml
#
# Phase 4.1 — Local development services for Clinic Management SaaS.
# Per Roadmap v2.1 §4.1 and ADR-001 (PostgreSQL + RLS).
#
# Services:
#   postgres  — PostgreSQL 17 (RLS foundation; the app connects as app_role
#               with NOBYPASSRLS so policies are enforced).
#   redis     — Redis 7 (BullMQ queues for apps/worker; Phase 11 registers
#               the first real queues).
#   orthanc   — Orthanc DICOM server (Phase 10 imaging dev; stub now so the
#               dev environment matches production shape from day one).
#
# Usage:
#   docker compose up -d              # start all three services
#   docker compose ps                 # all three must show "healthy"
#   docker compose logs -f postgres   # tail postgres logs
#   docker compose down               # stop (keeps volumes)
#   docker compose down -v            # stop + DELETE all data (reset)
#
# The first `docker compose up -d` auto-runs 001_roles.sh inside the
# postgres container (mounted to /docker-entrypoint-initdb.d/). The
# wrapper passes passwords via psql :var substitution so 001_roles.sql
# itself contains no plaintext credentials. This creates ops_superuser
# (BYPASSRLS) and app_role (NOBYPASSRLS). To re-run on an existing volume:
#   docker compose exec postgres \
#     psql -U postgres -d clinic_dev \
#     -v app_role_password="$APP_ROLE_PASSWORD" \
#     -v ops_password="$OPS_PASSWORD" \
#     -f /sql/001_roles.sql

services:
  postgres:
    image: postgres:17-alpine
    container_name: clinic-saas-postgres
    environment:
      # JC-18-1: POSTGRES_USER is `postgres` (the default superuser), NOT
      # `app_role` as Roadmap §4.1.1 originally specified. Rationale: if
      # POSTGRES_USER=app_role, the Docker image creates app_role as a
      # superuser, and the roles SQL must then downgrade app_role — a
      # chicken-and-egg problem (the roadmap acknowledges this in §4.2.2
      # and suggests a Docker entrypoint script as the workaround). Using
      # POSTGRES_USER=postgres avoids the problem entirely: the initdb
      # script runs as the real superuser (postgres) and creates both
      # ops_superuser and app_role from scratch with the correct
      # privileges. app_role is never a superuser, even momentarily.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_postgres_password
      POSTGRES_DB: clinic_dev
      # Passwords for the DB roles created by 001_roles.sql.
      # Passed to psql via :var substitution by 001_roles.sh.
      # Dev-only defaults; staging/prod use .env.staging per ADR-011.
      APP_ROLE_PASSWORD: dev_password
      OPS_PASSWORD: dev_ops_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run the roles SQL on first init (when the data dir is empty).
      # 001_roles.sh is a wrapper that passes passwords via psql :var
      # substitution so 001_roles.sql itself contains no plaintext creds.
      # The .sql file is mounted to /sql/ for the wrapper to reference.
      - ./packages/db/sql/001_roles.sh:/docker-entrypoint-initdb.d/001_roles.sh:ro
      - ./packages/db/sql/001_roles.sql:/sql/001_roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clinic-saas-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orthanc:
    # Orthanc DICOM server — Phase 10 imaging dev. Stub now so the dev
    # environment matches production shape. Default config listens on
    # :8042 with auth enabled (orthanc/orthanc). Phase 10 will mount a
    # custom orthanc.json.
    #
    # Image pinned to a specific stable tag (NOT :latest) per the critical
    # review §9.1 30-8: ":latest is unpinned. Production deployment should
    # scan images for CVEs." Tag 26.6.1 was the latest stable at the time
    # of PR #28. Bump deliberately — never auto-bump via Renovate without
    # testing the imaging module first (Phase 10+).
    # See: https://hub.docker.com/r/orthancteam/orthanc/tags
    image: orthancteam/orthanc:26.6.1
    container_name: clinic-saas-orthanc
    ports:
      - "8042:8042"
    volumes:
      - orthancdata:/var/lib/orthanc/db
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  orthancdata:
